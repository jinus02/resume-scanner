<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="PaddleOCR PP-OCRv3 기반 한국어 이력서 스캐너 (실험 버전)" />
<meta name="referrer" content="no-referrer" />
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ctext%20y%3D%22.9em%22%20font-size%3D%2290%22%3E%F0%9F%A7%AA%3C%2Ftext%3E%3C%2Fsvg%3E" />
<!-- v2 는 실험 빌드라서 CSP 를 약간 더 느슨하게 설정 (esm.sh 허용) -->
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'wasm-unsafe-eval' https://cdn.jsdelivr.net https://esm.sh blob:; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src https://cdn.jsdelivr.net; img-src 'self' blob: data:; worker-src 'self' blob: https://cdn.jsdelivr.net https://esm.sh; connect-src 'self' https://cdn.jsdelivr.net https://esm.sh; frame-ancestors 'none'; base-uri 'self'; form-action 'none';" />
<title>이력서 스캐너 v2 — PaddleOCR (실험)</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="preconnect" href="https://esm.sh" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" crossorigin="anonymous" />
<link rel="stylesheet" href="./styles.css" />
<style>
  .v2-banner {
    display: inline-block;
    margin-top: 12px;
    padding: 8px 16px;
    background: linear-gradient(135deg, #2b5cff, #8b5cff);
    color: #fff;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
  }
  .v2-banner a { color: #fff; text-decoration: underline; }
</style>
</head>
<body>
<header class="hero">
  <h1>이력서 스캐너 <small style="font-size: 0.5em; color: var(--text-sub);">v2</small></h1>
  <p><strong>PaddleOCR PP-OCRv3</strong> 기반 한국어 특화 OCR 실험 빌드. 탐지 + 인식 모델을 ONNX Runtime Web 으로 브라우저에서 직접 실행합니다.</p>
  <div class="v2-banner">🧪 실험 버전 · <a href="./index.html">← v1 (Tesseract)</a></div>
  <div id="loadStatus" class="learned-badge" style="display:block; margin-top: 16px;">엔진 로딩 대기 중…</div>
</header>

<main>
  <section id="dropZone" class="drop-zone" aria-label="이미지 업로드 영역">
    <div class="drop-inner">
      <div class="drop-icon" aria-hidden="true">🧪</div>
      <p class="drop-title">여기에 이미지를 끌어다 놓으세요</p>
      <p class="drop-sub">또는</p>
      <label class="file-button">
        파일 선택
        <input id="fileInput" type="file" accept="image/*" multiple hidden />
      </label>
      <p class="drop-hint">PNG · JPG · WEBP · 한국어 특화</p>
    </div>
  </section>

  <section id="results" class="results" aria-live="polite"></section>
</main>

<footer>
  <p>© 이력서 스캐너 v2 · <a href="https://github.com/gutenye/ocr" target="_blank" rel="noopener noreferrer">@gutenye/ocr-browser</a> + <a href="https://huggingface.co/monkt/paddleocr-onnx" target="_blank" rel="noopener noreferrer">monkt/paddleocr-onnx</a> (Apache 2.0)</p>
</footer>

<script type="module" src="./v2.js"></script>
</body>
</html>
